<div
  class="relative z-10 overflow-hidden py-4"
  [class]="dark()
    ? 'bg-forest text-cream'
    : 'border-y border-forest/15 bg-parchment text-forest'"
>
  <div class="anim-marquee flex w-max">
    @for (row of [0, 1]; track row) {
      <div class="flex shrink-0 items-center">
        @for (t of items; track t) {
          <span class="flex items-center">
            <span class="whitespace-nowrap px-6 font-serif-brand text-lg italic tracking-wide sm:text-xl">
              {{ t }}
            </span>
            <app-sprout-logo className="h-4 w-4 opacity-70" [color]="dark() ? '#9ec49a' : '#3f6b4f'" />
          </span>
        }
      </div>
    }
  </div>
</div>
