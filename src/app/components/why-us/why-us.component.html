<section class="relative overflow-hidden bg-cream py-24 sm:py-32">
  <div class="mx-auto max-w-6xl px-6">
    <div class="text-center">
      <p appReveal class="text-[11px] font-bold uppercase tracking-[0.34em] text-moss">Why choose us</p>
      <h2 class="mt-4 font-serif-brand text-[clamp(2.2rem,5.5vw,4rem)] font-medium leading-tight tracking-tight text-forest">
        <app-word-reveal text="Honest by design" />
      </h2>
    </div>

    <div class="mt-16 grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
      @for (it of items; track it.title; let i = $index) {
        <div
          appReveal
          [y]="60"
          [rotate]="cardRotate(i)"
          [delay]="cardDelay(i)"
          class="why-card group rounded-[26px] border border-forest/10 bg-parchment p-8 text-center shadow-[0_18px_45px_-28px_rgba(18,38,26,.3)] transition-all duration-500 ease-in-out hover:bg-forest hover:-translate-y-2.5"
        >
          <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-sprout/25 transition-colors duration-500 ease-in-out group-hover:bg-sprout/20">
            <svg
              viewBox="0 0 24 24"
              class="h-8 w-8 stroke-moss transition-colors duration-500 ease-in-out group-hover:stroke-sprout"
              fill="none"
              stroke-width="1.7"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path class="why-icon-path" [attr.d]="it.d" pathLength="1" [style.--icon-delay]="iconDelay(i)" />
            </svg>
          </div>
          <h3 class="mt-5 font-serif-brand text-xl font-semibold text-forest transition-colors duration-500 ease-in-out group-hover:text-cream">
            {{ it.title }}
          </h3>
          <p class="mt-2.5 text-sm leading-relaxed text-forest/60 transition-colors duration-500 ease-in-out group-hover:text-cream/70">
            {{ it.text }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
